name: Node.js Package
on:
  release:
    types: [created]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      # Force NODE_AUTH_TOKEN empty so .npmrc has no static token and npm
      # falls through to OIDC trusted publishing. setup-node defaults this
      # to GITHUB_TOKEN, which the npm registry rejects (masked as 404).
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ''
