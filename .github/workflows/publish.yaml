name: Node.js Package
on:
  release:
    types: [created]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: echo "registry=https://registry.npmjs.org/" > "$NPM_CONFIG_USERCONFIG"
      - name: Show npm config
        run: npm config list
      - run: npm publish --provenance
      - name: Show npm debug log on failure
        if: failure()
        run: cat /home/runner/.npm/_logs/*.log 2>/dev/null || echo "No debug log found"
